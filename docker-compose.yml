services:
  # ---------- infrastructure ----------
  postgres:
    image: postgres:16-alpine
    container_name: lg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ledgerguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ledgerguard}
      POSTGRES_DB: ${POSTGRES_DB:-ledgerguard}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ledgerguard}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lg-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.9.0
    container_name: lg-kafka
    restart: unless-stopped
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------- application services ----------
  auth-service:
    build: ./services/auth-service
    container_name: lg-auth-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4001
      DATABASE_URL: postgres://${POSTGRES_USER:-ledgerguard}:${POSTGRES_PASSWORD:-ledgerguard}@postgres:5432/${POSTGRES_DB:-ledgerguard}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRES_IN: 15m
      REFRESH_EXPIRES_IN: 7d
    ports:
      - "4001:4001"

  transaction-service:
    build: ./services/transaction-service
    container_name: lg-transaction-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      PORT: 4002
      DATABASE_URL: postgres://${POSTGRES_USER:-ledgerguard}:${POSTGRES_PASSWORD:-ledgerguard}@postgres:5432/${POSTGRES_DB:-ledgerguard}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      KAFKA_BROKERS: kafka:9092
    ports:
      - "4002:4002"

  ml-prediction-service:
    build: ./services/ml-prediction-service
    container_name: lg-ml-prediction-service
    restart: unless-stopped
    environment:
      PORT: 5001
    ports:
      - "5001:5001"

  fraud-detection-service:
    build: ./services/fraud-detection-service
    container_name: lg-fraud-detection-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-ledgerguard}:${POSTGRES_PASSWORD:-ledgerguard}@postgres:5432/${POSTGRES_DB:-ledgerguard}
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml-prediction-service:5001

  audit-service:
    build: ./services/audit-service
    container_name: lg-audit-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      PORT: 4003
      DATABASE_URL: postgres://${POSTGRES_USER:-ledgerguard}:${POSTGRES_PASSWORD:-ledgerguard}@postgres:5432/${POSTGRES_DB:-ledgerguard}
      KAFKA_BROKERS: kafka:9092
    ports:
      - "4003:4003"

  notification-service:
    build: ./services/notification-service
    container_name: lg-notification-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      PORT: 4004
      KAFKA_BROKERS: kafka:9092
    ports:
      - "4004:4004"

  api-gateway:
    build: ./services/api-gateway
    container_name: lg-api-gateway
    restart: unless-stopped
    depends_on:
      - auth-service
      - transaction-service
      - audit-service
    environment:
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      AUTH_SERVICE_URL: http://auth-service:4001
      TRANSACTION_SERVICE_URL: http://transaction-service:4002
      AUDIT_SERVICE_URL: http://audit-service:4003
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: lg-frontend
    restart: unless-stopped
    depends_on:
      - api-gateway
      - notification-service
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_WS_URL: ws://localhost:4004
    ports:
      - "3000:80"

volumes:
  pg-data: